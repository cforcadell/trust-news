
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../service.yaml
  - ../../statefulset.yaml

# Reemplaza el comando manual: kubectl create secret generic mongodb-secret ...
secretGenerator:
- name: mongodb-secret
  namespace: infra
  envs:
    - mongodb.env

generatorOptions:
  disableNameSuffixHash: true