
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../configmap.yaml
  - ../../service.yaml
  - ../../deployment.yaml
generatorOptions:
  disableNameSuffixHash: true
# Reemplaza el comando manual: kubectl create secret generic mongodb-secret ...
secretGenerator:
- name: gate-config
  namespace: apis
  envs:
    - gateway.env

namespace: apis