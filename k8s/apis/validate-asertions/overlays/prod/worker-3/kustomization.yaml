apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/configmap-common.yaml
  - ../../../base/deployment-validator.yaml
  - service.yaml

nameSuffix: "-3" # Esto cambia el nombre a validate-worker-1 y validator-secret-1

configMapGenerator:
- name: validator-contract
  namespace: apis
  files:
    - TrustNews.json=../../../../../../smart-contracts/artifacts/contracts/TrustNews.sol/TrustNews.json
- name: validate-common-config
  namespace: apis
  behavior: merge  # <-- Esto es CLAVE para solo cambiar lo que indiques abajo
  literals:
    - CONTRACT_ADDRESS="0x9eA62eb7944349C407B307025644E47bF22F8bCc"
# Leemos tu archivo .env local para generar el secreto
# secretGenerator:
#   - name: validator-secret
#     namespace: apis
#     envs:
#       - prod-worker-3.env

# Desactivamos el hash aleatorio al final del nombre del secreto
generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: validate-worker
    patch: |-
      - op: replace
        path: /spec/template/metadata/labels/instance
        value: "3"
      - op: replace
        path: /spec/selector/matchLabels/instance
        value: "3"
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "validator-secret-3"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/valueFrom/secretKeyRef/name
        value: "validator-secret-3"
      - op: replace
        path: /spec/template/spec/containers/0/env/2/valueFrom/secretKeyRef/name
        value: "validator-secret-3"
  - path: patch-resources.yaml
