name: CI - Build & Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecutarlo a mano si lo necesitas

# Permisos vitales para publicar imágenes en GHCR y crear Releases en el repo
permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Crear Release Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Crear GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generateReleaseNotes: true

      - name: Login a GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/

      - name: Skaffold Build & Push
        # Construye las imágenes basándose en tu skaffold.yaml y las sube a GHCR.
        # El flag --default-repo añade dinámicamente el prefijo de tu registry a todas tus imágenes.
        run: |
          skaffold build \
            --default-repo ghcr.io/${{ github.repository_owner }}/blockchain-tfm \
            --push=true \
            --file-output=build.json

      - name: Guardar artifact del build
        # Guardamos el build.json generado. En el futuro, el job de despliegue a Hetzner lo descargará.
        uses: actions/upload-artifact@v4
        with:
          name: skaffold-build-artifact
          path: build.json