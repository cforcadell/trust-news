apiVersion: v1
kind: ConfigMap
metadata:
  name: validate-common-config
  namespace: apis
data:
  AI_PROVIDER: "openrouter"
  MODEL: "arcee-ai/trinity-large-preview:free"
  API_URL: "https://openrouter.ai/api/v1/chat/completions"
  VALIDATION_PROMPT: |
    Valida la siguiente aserción de forma factual y objetiva
    utilizando tu conocimiento general y fuentes públicas conocidas.

    Tu respuesta DEBE ser exclusivamente un objeto JSON válido
    que se ajuste estrictamente a la siguiente estructura:

    {
      \"resultado\": \"TRUE | FALSE | UNKNOWN\",
      \"descripcion\": \"Justificación clara y detallada del resultado\"
    }

    Reglas de validación:
    - Usa TRUE solo si la aserción es claramente correcta según conocimiento ampliamente aceptado.
    - Usa FALSE solo si la aserción es claramente incorrecta o contradice hechos conocidos.
    - Usa UNKNOWN si no hay evidencia suficiente, los datos son ambiguos
      o el hecho no puede verificarse con certeza.

    Restricciones:
    - No incluyas texto fuera del objeto JSON.
    - No añadas campos adicionales.
    - No incluyas explicaciones fuera de \"descripcion\".
    - No utilices formato markdown ni bloques de código.
    El idioma de la respuesta debe ser el mismo que el de la aserción validada.
  
  # Kafka (Namespace infra)
  KAFKA_BOOTSTRAP: "kafka.infra.svc.cluster.local:9092"
  KAFKA_REQUEST_TOPIC: "fake_news_requests_validate"
  KAFKA_RESPONSE_TOPIC: "fake_news_responses"
  # Blockchain (Namespace blockchain)
  RPC_URL: "http://geth-rpc-endpoint.blockchain.svc.cluster.local:8555"
  CONTRACT_ADDRESS: "0x9eA62eb7944349C407B307025644E47bF22F8bCc"
  CONTRACT_ABI_PATH: "/app/smart-contracts/artifacts/contracts/TrustNews.sol/TrustNews.json"
  # IPFS (Namespace apis)
  IPFS_API_URL: "http://ipfs-fastapi.apis.svc.cluster.local:8060"
  ENABLE_REGISTER_VALIDATOR_STARTUP: "true"
  LOG_LEVEL: "INFO"