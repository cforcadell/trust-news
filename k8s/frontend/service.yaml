apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend
spec:
  type: NodePort
  selector:
    app: frontend-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080 
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443