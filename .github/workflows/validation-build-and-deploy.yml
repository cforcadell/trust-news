name: Validation - Build & Deploy

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de Skaffold a desplegar'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - setup
          - blockchain-prod
          - infra-prod
          - apis-frontend-prod

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy-validation:
    runs-on: ubuntu-latest
    environment: prod # Usamos prod para tener acceso a los secrets de Hetzner
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Skaffold y Kubectl
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/

      - name: Configurar Túnel SSH y Kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
          SERVER_IP: ${{ secrets.HETZNER_IP }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H $SERVER_IP >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p 2222 -o ExitOnForwardFailure=yes -f -N -L 6443:127.0.0.1:6443 $SSH_USER@$SERVER_IP
          
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          export KUBECONFIG=$HOME/.kube/config
          kubectl config set-cluster default --server=https://127.0.0.1:6443 --insecure-skip-tls-verify=true
          kubectl config set-context default --cluster=default --user=default
          kubectl config use-context default
          
          echo "Verificando conexión con el clúster..."
          kubectl cluster-info

      - name: Skaffold Build & Deploy
        run: |
          PROFILE="${{ github.event.inputs.profile || 'all' }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          echo "Fase 1: Construyendo y forzando push a GHCR con etiqueta $SHORT_SHA..."
          skaffold build \
            --default-repo ghcr.io/${{ github.repository_owner }}/blockchain-tfm \
            --tag=$SHORT_SHA \
            --push=true \
            --profile=$PROFILE \
            --file-output=build.json
            
          echo "Fase 2: Desplegando en el clúster de Hetzner..."
          skaffold deploy \
            --build-artifacts=build.json \
            --profile=$PROFILE