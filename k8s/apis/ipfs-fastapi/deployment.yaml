apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipfs-fastapi
  namespace: apis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipfs-fastapi
  template:
    metadata:
      labels:
        app: ipfs-fastapi
    spec:
      initContainers: # SECCIÓN A AÑADIR (Corre antes de todo)
        - name: wait-for-kafka
          image: busybox:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          command:
            - /bin/sh
            - -c
            - |
              until nc -z kafka.infra.svc.cluster.local 9092; do
                echo "Esperando a Kafka..."
                sleep 2
              done
      containers:
      - name: ipfs-fastapi
        #image: tfm-ipfs-fastapi:latest
        image: ipfs-api
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8060
        envFrom:
        - configMapRef:
            name: ipfs-fastapi-config
        env:
        # Apuntamos al servicio interno de IPFS en el namespace infra
        - name: IPFS_HOST
          value: "ipfs.infra.svc.cluster.local"
        - name: IPFS_PORT
          value: "5001"