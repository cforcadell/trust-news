apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: blockchain-tfm

build:
  local:
    push: false
    useBuildkit: true
  artifacts:
    - image: generate-asertions
      context: api
      docker: {dockerfile: generate-asertions/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: validate-asertions
      context: api
      docker: {dockerfile: validate-asertions/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: news-handler
      context: api
      docker: {dockerfile: news-handler/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: news-chain
      context: api
      docker: {dockerfile: news-chain/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: ipfs-api
      context: api
      docker: {dockerfile: ipfs/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: web-classic
      context: web_classic
      docker: {dockerfile: Dockerfile}

# Por defecto: No levanta nada o todo. Aquí lo dejamos vacío/mínimo para forzar el uso de perfiles.
manifests:
  kustomize:
    buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
    paths: []
  rawYaml:
    - k8s/namespaces.yaml

deploy:
  kubectl: {}

portForward: [] # Se define dentro de cada perfil para evitar avisos de servicios no encontrados

profiles:
  # ---------------------------------------------------------
  # PERFIL: APIS + FRONTEND
  # ---------------------------------------------------------
  - name: apis-frontend
    patches:
      - op: add
        path: /manifests/kustomize/paths
        value:
          - k8s/apis/generate-asertions
          - k8s/apis/validate-asertions
          - k8s/apis/news-handler
          - k8s/apis/news-chain
          - k8s/frontend
      - op: add
        path: /portForward
        value:
          - {resourceType: service, resourceName: news-handler, namespace: apis, port: 8072, localPort: 8072}
          - {resourceType: service, resourceName: generate-asertions, namespace: apis, port: 8071, localPort: 8071}
          - {resourceType: service, resourceName: news-chain, namespace: apis, port: 8073, localPort: 8073}
          - {resourceType: service, resourceName: frontend-service, namespace: frontend, port: 443, localPort: 8443, address: 0.0.0.0}

  # ---------------------------------------------------------
  # PERFIL: BLOCKCHAIN
  # ---------------------------------------------------------
  - name: blockchain
    patches:
      - op: add
        path: /manifests/rawYaml/-
        value: k8s/blockchain/*.yaml
      - op: add
        path: /manifests/rawYaml/-
        value: k8s/blockchain/bootnode/*.yaml
      - op: add
        path: /manifests/rawYaml/-
        value: k8s/blockchain/validator/*.yaml
      - op: add
        path: /manifests/rawYaml/-
        value: k8s/blockchain/rpc/*.yaml

  # ---------------------------------------------------------
  # PERFIL: INFRA (Kafka, Zookeeper, IPFS, Logs)
  # ---------------------------------------------------------
  - name: infra
    patches:
      - op: add
        path: /manifests/kustomize/paths
        value: ["k8s/infra/mongodb"]
      - op: add
        path: /manifests/rawYaml
        value:
          - k8s/namespaces.yaml
          - k8s/infra/zookeeper/*.yaml
          - k8s/infra/kafka/*.yaml
          - k8s/infra/ipfs/*.yaml
          - k8s/infra/fluent-bit/*.yaml
          - k8s/infra/frontend-logs/*.yaml
          - k8s/apis/ipfs-fastapi/*.yaml
      - op: add
        path: /portForward
        value:
          - {resourceType: service, resourceName: ipfs-fastapi, namespace: apis, port: 8060, localPort: 8060}
          - {resourceType: service, resourceName: grafana, namespace: infra, port: 80, localPort: 3000, address: 0.0.0.0}