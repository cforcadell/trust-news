<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust News</title>
    <link rel="stylesheet" href="css/style.css"> 
    <link rel="icon" type="image/png" href="img/fake_news_v3.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<aside id="sidebar">
    <div id="sidebar-header" class="sidebar-header">
        <h1>Trust News</h1>
    </div>

    <div style="height: 15px;"></div>

    <nav class="sidebar-nav">
        <div class="menu-group">
            <h2 class="menu-title">Verificación News</h2>
            <div class="submenu">
                <button class="nav-btn active" onclick="showSection('news')">Nueva Verificación Automática</button>
                <button class="nav-btn" onclick="showSection('orders')">Listado de Órdenes</button>
                <button class="nav-btn" onclick="showSection('order')">Buscar Órdenes</button>
                <button class="nav-btn" onclick="showSection('consistency')">Comprobar Consistencia</button>
            </div>
        </div>

        <div class="menu-group">
            <h2 class="menu-title">Explorador</h2>
            <div class="submenu">
                <button class="nav-btn" onclick="showSection('ipfs')">Buscar Documento (IPFS)</button>
                <button class="nav-btn" onclick="showSection('tx')">Buscar Transacciones</button>
                <button class="nav-btn" onclick="showSection('blocks')">Buscar Bloques</button>
                <button class="nav-btn" onclick="showSection('contract')">Buscar Post (Contract)</button>
            </div>
        </div>
    </nav>
</aside>

<main id="main">
    <header class="top-header">
        <div class="header-content">
            <div id="statusBar" class="status-toast"></div>
        </div>
    </header>

    <div class="content-wrapper">
        
        <section id="news" class="active card">
            <h2>Verificación y Búsqueda de Noticias</h2>

            <div class="news-import-container input-group">
                <input type="text" id="newsUrl" placeholder="Escribe la URL a importar">
                <button id="btn-importarNew" class="btn-primary">Importar Noticia</button>
            </div>

            <textarea id="newsText" placeholder="Escribe la noticia aquí para publicar, o el texto a buscar."></textarea>
            
            <div class="action-bar" style="margin-top: 15px; margin-bottom: 20px;">
                <button id="btn-generateAssertions" class="btn-secondary">Generar Aserciones</button>
                <button id="btn-publishNew" class="btn-primary">Publicar Noticia</button>
            </div>

            <div id="news-assertions-container" class="mt-4"></div>
            <table id="findResults"></table>
        </section>

        <section id="orders" class="card">
            <h2>Historial de Órdenes</h2>
            <div id="ordersTopBar" style="margin-bottom: 15px;">
                <button id="btn-listOrders" class="btn-secondary">Refrescar Listado</button>
            </div>
            <div id="listFixedDetailsContainer"></div> 
            <div id="listOrderTabs" class="tabs"></div>
            <div id="listTabContent"></div> 
        </section>

        <section id="order" class="card">
            <h2>Buscar Orden Específica</h2>
            <div id="orderTopBar" class="input-group">
                <input type="text" id="orderId" placeholder="Introduce el order_id"/>
                <button id="btn-findOrder" class="btn-primary">Buscar Order</button>
            </div>
            <div id="fixedDetailsContainer"></div> 
            <div id="orderTabs" class="tabs"></div>
            <div id="tabContent"></div> 
        </section>

        <section id="consistency" class="card">
            <h2>Check de Integridad con Ethereum</h2>
            <div class="input-group">
                <input type="text" id="orderIdCons" placeholder="Introduce order Id"/>
                <button id="btn-checkConsistency" class="btn-primary">Comprobar Consistencia</button>
            </div>
            <table id="postConsistency"></table>
        </section>

        <section id="ipfs" class="card">
            <h2>Búsqueda en IPFS</h2>
            <div class="input-group">
                <input type="text" id="ipfsHash" placeholder="Introduce IPFS hash"/>
                <button id="btn-findIpfs" class="btn-primary">Buscar IPFS</button>
            </div>
            <table id="ipfsTable"></table>
        </section>

        <section id="tx" class="card">
            <h2>Consulta de Transacciones</h2>
            <div class="input-group">
                <input type="text" id="txHash" placeholder="Introduce transaction hash (ej: 0x55d2817a...)"/>
                <button id="btn-findTx" class="btn-primary">Buscar Transacción</button>
            </div>
            <table id="txTable"></table>
        </section>

        <section id="blocks" class="card">
            <h2>Consulta de Bloques</h2>
            <div class="input-group">
                <input type="text" id="blockId" placeholder="Introduce block number o hash"/>
                <button id="btn-findBlock" class="btn-primary">Buscar Bloque</button>
            </div>
            <table id="blockTable"></table>
        </section>

        <section id="contract" class="card">
            <h2>Smart Contract (Post)</h2>
            <div class="input-group">
                <input type="text" id="postId" placeholder="Introduce post Id"/>
                <button id="btn-findPost" class="btn-primary">Buscar Post</button>
            </div>
            <table id="postTable"></table>
        </section>

    </div>
</main>

<script src="js/app.js"></script>

</body>
</html>
