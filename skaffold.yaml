apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: blockchain-tfm

build:
  
  tagPolicy:
    gitCommit: {}
  local:
    push: false
    useBuildkit: true
    concurrency: 1

deploy:
  kubectl: {}

profiles:
  # ---------------------------------------------------------
  # PERFIL: SETUP
  # ---------------------------------------------------------
  - name: setup
    manifests:
      rawYaml:
        - k8s/namespaces.yaml

  # ---------------------------------------------------------
  # PERFIL: BLOCKCHAIN
  # ---------------------------------------------------------
  - name: blockchain
    manifests:
      kustomize:
        buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
        paths:
          - k8s/blockchain/overlays/local

  # ---------------------------------------------------------
  # PERFIL: INFRA
  # ---------------------------------------------------------
  - name: infra
    build:
      artifacts:
          - image: keycloak
            context: keycloak
            docker: {dockerfile: Dockerfile}
    manifests:
      rawYaml:
        #- k8s/infra/zookeeper/*.yaml
        - k8s/infra/kafka/*.yaml
        - k8s/infra/ipfs/*.yaml
        - k8s/infra/fluent-bit/*.yaml
        - k8s/infra/frontend-logs/*.yaml
      kustomize:
        buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
        paths:
          - k8s/infra/mongodb/overlays/local
          - k8s/infra/keycloak/overlays/local

    portForward:
      - {resourceType: service, resourceName: grafana, namespace: infra, port: 3000, localPort: 3000, address: "0.0.0.0"}

  # ---------------------------------------------------------
  # PERFIL: APIS + FRONTEND
  # ---------------------------------------------------------
  - name: apis-frontend
    build:
      artifacts:
        - image: generate-asertions
          context: api
          docker: {dockerfile: generate-asertions/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: validate-asertions
          context: api
          docker: {dockerfile: validate-asertions/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: news-handler
          context: api
          docker: {dockerfile: news-handler/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: news-chain
          context: api
          docker: {dockerfile: news-chain/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: ipfs-api
          context: api
          docker: {dockerfile: ipfs/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: gateway
          context: api
          docker: {dockerfile: gateway/Dockerfile}
          sync: {infer: ["**/*.py"]}          
        - image: admin
          context: api
          docker: {dockerfile: admin/Dockerfile}
          sync: {infer: ["**/*.py"]}  
        - image: web-classic
          context: web_classic
          docker: {dockerfile: Dockerfile}

    manifests:
      rawYaml:
        - k8s/apis/ipfs-fastapi/*.yaml
      kustomize:
        buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
        paths:

          - k8s/apis/generate-asertions/overlays/local
          - k8s/apis/validate-asertions/overlays/local/worker-1
          - k8s/apis/validate-asertions/overlays/local/worker-2
          - k8s/apis/validate-asertions/overlays/local/worker-3
          - k8s/apis/news-handler/overlays/local
          - k8s/apis/news-chain/overlays/local
          - k8s/apis/gateway/overlays/local
          - k8s/apis/admin/overlays/local
          - k8s/frontend
    portForward:
      - {resourceType: service, resourceName: generate-asertions, namespace: apis, port: 8071, localPort: 8071}
      - {resourceType: service, resourceName: validate-service-1, namespace: apis, port: 8070, localPort: 8070}
      - {resourceType: service, resourceName: validate-service-2, namespace: apis, port: 8070, localPort: 8069}
      - {resourceType: service, resourceName: validate-service-3, namespace: apis, port: 8070, localPort: 8068}
      - {resourceType: service, resourceName: news-handler, namespace: apis, port: 8072, localPort: 8072}
      - {resourceType: service, resourceName: news-chain, namespace: apis, port: 8073, localPort: 8073}
      - {resourceType: service, resourceName: ipfs-fastapi, namespace: apis, port: 8060, localPort: 8060}
      - {resourceType: service, resourceName: admin-service, namespace: apis, port: 8400, localPort: 8400, address: "0.0.0.0"}
      - {resourceType: service, resourceName: gateway, namespace: apis, port: 8500, localPort: 8500}
      - {resourceType: service, resourceName: frontend-service, namespace: frontend, port: 443, localPort: 7443, address: "0.0.0.0"}

  # ---------------------------------------------------------
  # PERFIL: BLOCKCHAIN PROD
  # ---------------------------------------------------------
  - name: blockchain-prod
    manifests:
      kustomize:
        buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
        paths:
          - k8s/blockchain/overlays/prod

  # ---------------------------------------------------------
  # PERFIL: INFRA PROD
  # ---------------------------------------------------------
  - name: infra-prod
    build:
      artifacts:
          - image: keycloak
            context: keycloak
            docker: {dockerfile: Dockerfile}
    manifests:
      rawYaml:
        #- k8s/infra/zookeeper/*.yaml
        - k8s/infra/kafka/*.yaml
        - k8s/infra/ipfs/*.yaml
        - k8s/infra/fluent-bit/*.yaml
        - k8s/infra/frontend-logs/*.yaml
      kustomize:
        buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
        paths:
          - k8s/infra/mongodb/overlays/prod 
          - k8s/infra/keycloak/overlays/prod

  # ---------------------------------------------------------
  # PERFIL: APIS + FRONTEND PROD
  # ---------------------------------------------------------
  - name: apis-frontend-prod
    build:
      artifacts:
        - image: generate-asertions
          context: api
          docker: {dockerfile: generate-asertions/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: validate-asertions
          context: api
          docker: {dockerfile: validate-asertions/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: news-handler
          context: api
          docker: {dockerfile: news-handler/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: news-chain
          context: api
          docker: {dockerfile: news-chain/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: ipfs-api
          context: api
          docker: {dockerfile: ipfs/Dockerfile}
          sync: {infer: ["**/*.py"]}
        - image: gateway
          context: api
          docker: {dockerfile: gateway/Dockerfile}
          sync: {infer: ["**/*.py"]} 
        - image: admin
          context: api
          docker: {dockerfile: admin/Dockerfile}
          sync: {infer: ["**/*.py"]}           
        - image: web-classic
          context: web_classic
          docker: {dockerfile: Dockerfile}

    manifests:
      rawYaml:
        - k8s/apis/ipfs-fastapi/*.yaml
      kustomize:
        buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
        paths:
          - k8s/apis/generate-asertions/overlays/prod 
          - k8s/apis/validate-asertions/overlays/prod/worker-1 
          - k8s/apis/validate-asertions/overlays/prod/worker-2
          - k8s/apis/validate-asertions/overlays/prod/worker-3
          - k8s/apis/news-handler/overlays/prod
          - k8s/apis/news-chain/overlays/prod
          - k8s/apis/gateway/overlays/prod
          - k8s/apis/admin/overlays/prod
          - k8s/frontend
    portForward:
      - {resourceType: service, resourceName: admin-service, namespace: apis, port: 8400, localPort: 8400, address: "0.0.0.0"}
      - {resourceType: service, resourceName: frontend-service, namespace: frontend, port: 443, localPort: 10443, address: "0.0.0.0"}
