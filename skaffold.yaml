apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: blockchain-tfm

build:
  local:
    push: false
    useBuildkit: true
  artifacts:
    - image: generate-asertions
      context: api
      docker: {dockerfile: generate-asertions/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: validate-asertions
      context: api
      docker: {dockerfile: validate-asertions/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: news-handler
      context: api
      docker: {dockerfile: news-handler/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: news-chain
      context: api
      docker: {dockerfile: news-chain/Dockerfile}
      sync:
        infer: ["**/*.py"]
    - image: ipfs-api
      context: api
      docker: {dockerfile: ipfs/Dockerfile}
      sync:
        infer: ["**/*.py"]
    #- image: web-classic
    #  context: web_classic
    #  docker: {dockerfile: Dockerfile}

# --- MANIFESTS GLOBALES ---
# Dejamos la raíz mínima para evitar borrados accidentales de namespaces
manifests:
  kustomize:
    buildArgs: ["--load-restrictor=LoadRestrictionsNone"]
    paths: []
  rawYaml: [] 

deploy:
  kubectl: {}

portForward: [] 

profiles:
  # ---------------------------------------------------------
  # PERFIL: SETUP
  # ---------------------------------------------------------
  - name: setup
    patches:
      - op: add
        path: /manifests/rawYaml
        value: 
          - k8s/namespaces.yaml
          - k8s/blockchain/blockchain-pvcs.yaml

  # ---------------------------------------------------------
  # PERFIL: BLOCKCHAIN
  # ---------------------------------------------------------
  - name: blockchain
    patches:
      - op: add
        path: /manifests/rawYaml
        value:
          - k8s/blockchain/configmap.yaml
          - k8s/blockchain/ethereum-keystores.yaml
          - k8s/blockchain/secret-template.yaml
          - k8s/blockchain/bootnode/*.yaml
          - k8s/blockchain/validator/*.yaml
          - k8s/blockchain/rpc/*.yaml

  # ---------------------------------------------------------
  # PERFIL: INFRA
  # ---------------------------------------------------------
  - name: infra
    patches:
      - op: add
        path: /manifests/kustomize/paths
        value: ["k8s/infra/mongodb"]
      - op: add
        path: /manifests/rawYaml
        value:
          - k8s/infra/zookeeper/*.yaml
          - k8s/infra/kafka/*.yaml
          - k8s/infra/ipfs/*.yaml
          - k8s/infra/fluent-bit/*.yaml
          - k8s/infra/frontend-logs/*.yaml
          - k8s/apis/ipfs-fastapi/*.yaml
      - op: add
        path: /portForward
        value:
          - {resourceType: service, resourceName: ipfs-fastapi, namespace: apis, port: 8060, localPort: 8060}
          - {resourceType: service, resourceName: grafana, namespace: infra, port: 80, localPort: 3000, address: 0.0.0.0}