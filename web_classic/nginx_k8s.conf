server {
    listen 80;
    server_name localhost;
    # 1. Cambiamos el puerto al NodePort de Kubernetes
    return 301 https://$host:7443$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    # 2. Nombres estándar de Kubernetes para secretos TLS
    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;


    # location /auth/admin/ {
    #     deny all;
    # }
    
    
    # location /auth/realms/master/ {
    #     deny all;
    # }



    location /auth/ {
        proxy_pass https://keycloak.infra.svc.cluster.local:8443; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 7443;
        
        proxy_ssl_verify off;

        # Añadimos esto para que si Keycloak falla, veamos el error real y no el index.html
        proxy_intercept_errors off;
    }

    location /backend/ {
        proxy_pass http://gateway.apis.svc.cluster.local:8500/trustnews/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Importante para que el gateway pueda leer el JWT desde Nginx si hay redirecciones
        proxy_pass_request_headers on;
    }
    
    location / {
        try_files $uri /index.html;
    }
}