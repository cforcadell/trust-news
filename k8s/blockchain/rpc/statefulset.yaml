apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: geth-rpc-endpoint
  namespace: blockchain
spec:
  serviceName: geth-rpc-endpoint
  replicas: 1
  selector:
    matchLabels:
      app: geth-rpc-endpoint
  template:
    metadata:
      labels:
        app: geth-rpc-endpoint
    spec:
      initContainers:
        - name: init-blockchain
          image: ethereum/client-go:v1.10.1
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -d "/root/.ethereum/geth/chaindata" ]; then
                echo "Inicializando la blockchain y restaurando cuentas..."
                geth init /etc/geth/genesis.json
                
                # Creamos el directorio de keystores
                mkdir -p /root/.ethereum/keystore
                
                # Copiamos TODAS las cuentas del Secret montado
                cp /etc/keystores/* /root/.ethereum/keystore/ 2>/dev/null || true
                
                echo "Cuentas restauradas con éxito."
              else
                echo "La blockchain ya está inicializada. Omitiendo..."
              fi
          volumeMounts:
            # CORRECCIÓN 1: El nombre debe coincidir con el volumeClaimTemplate
            - name: rpc-data 
              mountPath: /root/.ethereum
            - name: config-volume
              mountPath: /etc/geth/genesis.json
              subPath: genesis.json
            - name: keystores-volume
              mountPath: /etc/keystores
      containers:
        - name: geth-rpc
          image: ethereum/client-go:v1.10.1
          # CORRECCIÓN 2: Usar sh -c para que evalúe correctamente las variables del envFrom
          command:
            - /bin/sh
            - -c
            - |
              exec geth \
                --bootnodes=$BOOT_NODES \
                --nat=none \
                --allow-insecure-unlock \
                --http \
                --http.addr=0.0.0.0 \
                --http.port=8555 \
                --http.api=eth,web3,net,admin,personal \
                --http.corsdomain=* \
                --http.vhosts=* \
                --ws \
                --ws.addr=0.0.0.0 \
                --ws.port=8556 \
                --ws.api=eth,web3,net,admin,personal \
                --networkid=$NETWORK_ID \
                --unlock=$MASTER_PUBLIC_KEY \
                --password=/root/.ethereum/password.txt \
                --port=30304 \
                --miner.gaslimit=$GAS_LIMIT
          envFrom:
            - configMapRef:
                name: ethereum-config
          ports:
            - containerPort: 8555
              name: http
            - containerPort: 8556
              name: ws
            - containerPort: 30303
              name: p2p
          volumeMounts:
            - name: rpc-data
              mountPath: /root/.ethereum
            - name: secret-volume
              mountPath: /root/.ethereum/password.txt
              subPath: ACCOUNT_PASSWORD
      volumes:
        - name: config-volume
          configMap:
            name: ethereum-config
        - name: secret-volume
          secret:
            secretName: ethereum-secrets 
        - name: keystores-volume
          secret:
            secretName: ethereum-keystores
  volumeClaimTemplates:
    - metadata:
        name: rpc-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi