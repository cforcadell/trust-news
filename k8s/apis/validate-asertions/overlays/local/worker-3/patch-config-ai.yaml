apiVersion: apps/v1
kind: Deployment
metadata:
  name: validate-worker # Tiene que llamarse igual que en la base
  namespace: apis
spec:
  template:
    spec:
      containers:
      - name: worker
        # Kustomize inyectará estas variables automáticamente en la lista de 'env' de tu base
        env:
        - name: AI_PROVIDER
          value: "gemini"
        - name: MODEL
          value: "gemini-2.5-flash"
        - name: API_URL
          value: "https://generativelanguage.googleapis.com/v1beta"