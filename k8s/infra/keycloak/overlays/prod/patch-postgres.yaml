apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-db
  namespace: infra
spec:
  template:
    spec:
      containers:
        - name: postgres
          # Valores moderados para una base de datos de soporte
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"