apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/configmap-common.yaml
  - ../../../base/deployment-validator.yaml
  - service.yaml

nameSuffix: "-1" # Esto cambia el nombre a validate-worker-1 y validator-secret-1

configMapGenerator:
- name: validator-contract
  namespace: apis
  files:
    - TrustNews.json=../../../../../../smart-contracts/artifacts/contracts/TrustNews.sol/TrustNews.json
# Leemos tu archivo .env local para generar el secreto
secretGenerator:
  - name: validator-secret
    namespace: apis
    envs:
      - worker-1.env

# Desactivamos el hash aleatorio al final del nombre del secreto
generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: validate-worker
    patch: |-
      - op: replace
        path: /spec/template/metadata/labels/instance
        value: "1"
      - op: replace
        path: /spec/selector/matchLabels/instance
        value: "1"

  - path: patch-config-ai.yaml
