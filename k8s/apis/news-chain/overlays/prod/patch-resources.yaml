apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-chain # Tiene que coincidir con el nombre de la base
spec:
  # En producción podríamos querer 2 réplicas por si una cae, 
  # pero si tu worker no soporta concurrencia, déjalo en 1.
  replicas: 1 
  template:
    spec:
      containers:
      - name: news-chain
        # Definimos cuánta CPU y RAM reserva y cuál es su límite máximo
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"