name: CD - Deploy to Hetzner (Prod)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de Skaffold a desplegar'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - setup
          - blockchain-prod
          - infra-prod
          - apis-frontend-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod 
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar build.json (Artifact)
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-and-release.yml
          name: skaffold-build-artifact
          path: .

      - name: Instalar Skaffold y Kubectl
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          sudo install skaffold /usr/local/bin/
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install kubectl /usr/local/bin/

      - name: Configurar Túnel SSH y Kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
          SERVER_IP: ${{ secrets.HETZNER_IP }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          # 1. Preparar SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 2222 -H $SERVER_IP >> ~/.ssh/known_hosts
          
          # 2. Abrir túnel forzado
          ssh -i ~/.ssh/id_rsa -p 2222 -o ExitOnForwardFailure=yes -f -N -L 6443:127.0.0.1:6443 $SSH_USER@$SERVER_IP
          
          # 3. Setup Kubeconfig Robusto
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          
          # 4. FORZAR VARIABLES Y CONTEXTO
          # Esto evita que kubectl busque en /etc/ o en el puerto 8080
          export KUBECONFIG=$HOME/.kube/config
          kubectl config set-cluster default --server=https://127.0.0.1:6443 --insecure-skip-tls-verify=true
          kubectl config set-context default --cluster=default --user=default
          kubectl config use-context default
          
          # 5. Prueba de conexión (si falla aquí, el job se detiene con error claro)
          echo "Verificando conexión con el clúster..."
          kubectl cluster-info

      # --- DESPLIEGUES CONDICIONALES ---

      - name: Deploy Setup (Manual Only)
        if: ${{ github.event.inputs.profile == 'setup' }}
        run: skaffold deploy --build-artifacts=build.json --profile=setup --default-repo ghcr.io/${{ github.repository_owner }}/blockchain-tfm

      - name: Deploy Blockchain
        if: ${{ github.event.inputs.profile == 'all' || github.event.inputs.profile == 'blockchain-prod' }}
        run: skaffold deploy --build-artifacts=build.json --profile=blockchain --default-repo ghcr.io/${{ github.repository_owner }}/blockchain-tfm

      - name: Deploy Infraestructura Prod
        if: ${{ github.event.inputs.profile == 'all' || github.event.inputs.profile == 'infra-prod' }}
        run: skaffold deploy --build-artifacts=build.json --profile=infra-prod --default-repo ghcr.io/${{ github.repository_owner }}/blockchain-tfm

      - name: Deploy APIs y Frontend Prod
        if: ${{ github.event.inputs.profile == 'all' || github.event.inputs.profile == 'apis-frontend-prod' }}
        run: skaffold deploy --build-artifacts=build.json --profile=apis-frontend-prod --default-repo ghcr.io/${{ github.repository_owner }}/blockchain-tfm